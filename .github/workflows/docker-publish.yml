name: Build & Push AutoFilm WebUI to Docker Hub

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  workflow_dispatch:   # 允许手动触发

env:
  IMAGE_NAME: autofilm-webui

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. 安装 Node.js，构建前端
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: webui/frontend/package-lock.json

      - name: Install frontend deps
        working-directory: webui/frontend
        run: npm ci

      - name: Build frontend
        working-directory: webui/frontend
        run: npm run build

      # 3. 登录 Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. 提取镜像标签（main分支用latest，tag用版本号）
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      # 5. 设置 QEMU（支持多平台构建 amd64/arm64）
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 6. 设置 Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 7. 构建并推送镜像
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./webui
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
